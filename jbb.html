<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="jbb.css" rel="stylesheet">
</head>
<body>
        <h1 style="text-align: center;color: green;">BANDUNG BRANKAS</h1>
    <div id="produk-container"></div>
    <script>
        const produk = [
            {
                nama: "ichiban",
                harga: 20000,
                gambar: "pp.jpg"
            },
             {
                nama: "honeyweel",
                harga: 20000,
                gambar: "yy.jpg"
            },
             {
                nama: "unisafe",
                harga: 20000,
                gambar: "ll.jpg"
            },
             {
                nama: "safebox",
                harga: 20000,
                gambar: "hh.jpg"
            },
             {
                nama: "pressafe",
                harga: 20000,
                gambar: "gg.jpg"
            },
            {
                nama: "guard",
                harga: 25000,
                gambar: "bb.jpg"
            },
            {
                nama: "shield",
                harga: 30000,
                gambar: "oo.jpg"
            },
             {
                nama: "krisbow",
                harga: 30000,
                gambar: "pp.jpg"
            }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('produk-container');
            const tampilkan = produk.map((item) => {
                return `
                    <div class="card">
                        <div class="card-title">${item.nama}</div>
                        <h3>${item.harga}</h3>
                        <img src="${item.gambar}" alt="${item.nama}">
                        <button class="Beli">Beli</button>
                    </div>
                `;
            }).join('');
            container.innerHTML = tampilkan;
        });
    </script>
    </body>
    </html>
